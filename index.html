<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Sueldo en Tiempo Real</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1e1e1e; color: white; margin: 0; }
        .card { background: #2d2d2d; padding: 2rem 4rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; }
        .money { font-size: 4rem; font-weight: bold; color: #4ade80; font-variant-numeric: tabular-nums; }
        h2 { margin-top: 0; color: #a1a1aa; font-weight: normal; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ganado hoy</h2>
        <div class="money" id="daily">0.0000 €</div>
    </div>

    <script>
        // Sueldo: 1300€/mes -> 15600€/año -> ~7.5€/hora -> 0.00208333€/segundo
        const RATE_PER_SEC = 7.5 / 3600;

        function updateEarnings() {
            const now = new Date();
            const day = now.getDay();
            let earned = 0;

            // Solo de Lunes (1) a Viernes (5)
            if (day >= 1 && day <= 5) {
                const timeInSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

                const start1 = 8 * 3600 + 15 * 60; // 08:15
                const end1 = 14 * 3600;            // 14:00
                const start2 = 15 * 3600;          // 15:00
                const end2 = 17 * 3600 + 15 * 60;  // 17:15

                const morningSeconds = end1 - start1;

                if (timeInSeconds > start1 && timeInSeconds <= end1) {
                    earned = (timeInSeconds - start1) * RATE_PER_SEC; // Mañana
                } else if (timeInSeconds > end1 && timeInSeconds <= start2) {
                    earned = morningSeconds * RATE_PER_SEC; // Descanso
                } else if (timeInSeconds > start2 && timeInSeconds <= end2) {
                    earned = (morningSeconds + (timeInSeconds - start2)) * RATE_PER_SEC; // Tarde
                } else if (timeInSeconds > end2) {
                    earned = (morningSeconds + (end2 - start2)) * RATE_PER_SEC; // Fin del día
                }
            }
            
            document.getElementById('daily').innerText = earned.toFixed(4) + ' €';
        }

        setInterval(updateEarnings, 100); // Actualiza cada 100ms para un efecto fluido
        updateEarnings();
    </script>
</body>
</html>
